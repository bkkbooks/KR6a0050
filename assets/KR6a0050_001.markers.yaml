  - {type: variant, offset: 1633, length: 290, content: 此經，丹藏則名受歲經，而丹有宋無；宋藏則名受新歲經，而宋有丹無。按二經皆云法護譯，名雖少似，義乃大別，則未知其孰是孰非，又何二藏互有無耶？今按《開元錄．重譯錄》中容凾之內，有受歲經，竺法護譯，云與《中阿含經》第二十三卷初同本異譯，〈單譯錄〉中竟凾之內，有新歲經，竺曇無蘭晉云法正譯，注中有云：「《中含》大本無此等經，故編於此。」今撿丹受歲經，與彼《中含》二十三卷大同，則真是容凾重譯受歲經耳。宋本受新歲經，與彼《中含》全別，而與竟凾名新歲經者，在文雖異，大旨無殊，似是彼經之異譯耳。然今此容凾宋藏受新歲經，與彼竟凾新歲經，以為單譯耶，則何有廣（略之…本焉）六十六字緣山本缺依忍澂師校正本補略之殊、譯人之異，又此何編於重譯中耶？以為重譯耶，則彼何列于單譯中耶？此須待勘。今且欲類聚以待賢哲，故移受新歲經編于竟凾，此容凾中取此丹藏經，為真本焉, 宋: '', 元: '', 明: ''}
