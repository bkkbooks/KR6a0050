body:
  text: 西晉三藏竺法護譯聞如是一時婆伽婆在羅閱祇迦蘭陀竹園與大比丘眾俱受歲彼時尊者大目揵連告諸比丘諸賢比丘受歲者君當說君當教授君當教誡君當愛念謂第一故何以故諸賢或有人反戾難教與惡法俱謂梵行者亦不說亦不教授亦不教誡亦不愛念彼人謂第一故云何諸賢反戾難教謂梵行與俱者亦不說亦不教授亦不教誡亦不愛念彼人謂第一故此諸賢或一人惡求與惡求俱諸賢謂彼人惡求與惡求俱者此法反戾難教如是染欲瞋恨慳嫉不捨諛諂幻無羞無耻恚結口言恚結比丘語已還報其言比丘語已向多人說比丘語已而誹說各各有所說而外說之瞋恨結而廣與惡知識俱與惡伴俱不知恩潤不知反復諸賢謂彼人不知恩潤無反復者此反戾難教是為諸賢反戾難教法謂梵行與俱者亦不說亦不教授亦不教誡亦不愛念彼人謂第一故此諸賢比丘當自思量諸賢謂彼人者惡求與惡求俱是我所不念我若惡求與惡求俱他亦不念我比丘作等觀當莫惡求當作是學如是染欲瞋恨慳嫉不捨諛諂幻無羞無恥恚結口言恚結比丘語已還報其言比丘語已向多人說比丘語已而誹說各各有所說而外說之瞋恨而廣與惡知識俱與惡伴俱不知恩潤不知反復諸賢謂彼人不恩潤無反復者我所不愛我若不恩潤無反復者他亦不念我比丘當等觀當莫為無反復當學諸賢若比丘未受歲君說君當教授君當教誡君當愛念謂第一故何以故諸賢或有人無反戾與教法俱謂梵行與俱者當為說當為教授當為教誡愛念彼人謂第一故云何諸賢無反戾與教法俱謂梵行與俱者當為說當為教授當為教誡愛念彼人謂第一故此諸賢或一人無惡求不與惡求俱謂諸賢彼人無惡求不與惡求俱者此法無反戾如是不染欲不瞋恨不慳嫉不諛諂幻不無羞不無恥無恚結口不言恚結比丘語已不還報言比丘語已不向多人說比丘語已不誹說各各有所說不外之不瞋恨而廣之不與惡知識俱不與惡伴俱不無恩潤不無反復諸賢謂彼人此與教法俱是為諸賢不反戾與教法俱梵行與俱者當為說當為教授當為教誡愛念彼人為第一故此諸賢比丘當自思量諸賢謂彼人無惡求不與惡求俱者是我所念我若無惡求不與惡求俱者他亦念我比丘作等觀當莫惡求當作是學如是不染欲不瞋恨不慳嫉不捨不諛諂幻不無羞無恥無恚結口不言恚結比丘語已不還報言比丘語已不向多人說比丘語已不誹說各各有所說不外之不瞋恨而廣之不與惡知識俱不與惡伴俱不無恩潤不無反復諸賢彼人不無恩潤不無反復者我所愛念我若不無恩潤不無反復者他亦愛念我比丘作等觀不無恩潤不無反復當作是學此諸賢比丘觀已多有所益我為住惡求與惡求俱當不惡求與惡求俱此諸賢比丘觀而知我住惡求與惡求俱彼當不喜悅彼便進欲止此諸賢比丘觀而知我當不住惡求與惡求俱彼便喜悅清淨白佛世尊境界行見已樂行猶若諸賢有眼之士持極淨鏡自用觀面此諸賢有眼之士自見面塵垢便不喜悅彼便進欲除此垢諸賢有眼之士不自見面有塵垢彼便悅喜清淨自見已樂行如是諸賢比丘觀而知我為住惡求與惡求俱彼進欲止此諸賢比丘觀而知我當不住惡求不與惡求俱彼便喜悅清淨白佛世尊境界住見已樂行如是住染欲不住不染欲如是住瞋恨不住不瞋恨如是住慳嫉不捨不住不慳嫉不捨如是住諛諂幻不住不諛諂幻如是住無羞無恥不住不無羞不無恥如是住恚結口言恚結不住不恚結口言恚結比丘語已還報其言不住比丘語已不還報比丘語已向多人說不住比丘語已不向多人說比丘語已而誹說不住比丘語已不誹說各各有所說而外說之不住各各所說不外說之瞋恨不住不瞋恨而廣與惡知識俱與惡伴俱不住不與惡知識俱不與惡伴俱不知恩潤不知反復不住不無恩潤不無反復此諸賢比丘觀而知我住不知恩潤不知反復彼便不喜悅彼便進欲止此諸賢比丘觀而知我住不無恩潤住不無反復彼便喜悅清淨白佛世尊境界行自見已樂行猶若諸賢有眼之士持清淨鏡自照面此諸賢有眼之士自見面有塵垢彼便不喜悅便進欲止此諸賢此有眼之士不自見面有塵垢彼即喜悅清淨自見已樂行如是諸賢比丘觀而知住不恩潤反復彼便不喜悅即進欲止此諸賢比丘觀而知當我住不無恩潤不無反復彼便喜悅清淨白佛世尊境界行自見已樂行樂行已悅喜悅喜已身信行身信行已知安樂安樂已意定意定已知如真見如真知見如真已無厭無厭已無染無染已解脫解脫已得解脫知生已盡梵行已成所作已辦不受後有知如真賢者目揵連如是說彼諸比丘聞尊者目揵連所說歡喜而樂此經丹藏則名受歲經而丹有宋無宋藏則名受新歲經而宋有丹無按二經皆云法護譯名雖少似義乃大別則未知其孰是孰非又何二藏互有無耶今按開元錄重譯錄中容凾之內有受歲經竺法護譯云與中阿含經第二十三卷初同本異譯單譯錄中竟凾之內有新歲經竺曇無蘭晉云法正譯注中有云中含大本無此等經故編於此今撿丹受歲經與彼中含二十三卷大同則真是容凾重譯受歲經耳宋本受新歲經與彼中含全別而與竟凾名新歲經者在文雖異大旨無殊似是彼經之異譯耳然今此容凾宋藏受新歲經與彼竟凾新歲經以為單譯耶則何有廣略之殊譯人之異又此何編於重譯中耶以為重譯耶則彼何列于單譯中耶此須待勘今且欲類聚以待賢哲故移受新歲經編于竟凾此容凾中取此丹藏經為真本焉
